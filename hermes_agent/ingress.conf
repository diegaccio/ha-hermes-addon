pid /tmp/nginx.pid;

worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  access_log /data/nginx/access.log;
  error_log /data/nginx/error.log info;
  client_body_temp_path /data/nginx/body;
  proxy_temp_path /data/nginx/proxy;
  fastcgi_temp_path /data/nginx/fastcgi;
  uwsgi_temp_path /data/nginx/uwsgi;
  scgi_temp_path /data/nginx/scgi;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 9119;

    allow 127.0.0.1;
    allow ::1;
    allow 172.30.32.2;
    deny all;

    location / {
      proxy_pass http://127.0.0.1:9120;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }
  }
}
