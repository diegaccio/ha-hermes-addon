pid /tmp/nginx.pid;

worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  access_log /data/nginx/access.log;
  error_log /data/nginx/error.log info;
  client_body_temp_path /data/nginx/body;
  proxy_temp_path /data/nginx/proxy;
  fastcgi_temp_path /data/nginx/fastcgi;
  uwsgi_temp_path /data/nginx/uwsgi;
  scgi_temp_path /data/nginx/scgi;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 9119;

    allow 127.0.0.1;
    allow ::1;
    allow 172.30.32.2;
    deny all;

    location = /terminal {
      return 302 /terminal/;
    }

    location = /dashboard {
      return 302 /dashboard/;
    }

    location = /dashboard/favicon.ico {
      proxy_pass http://127.0.0.1:9120/favicon.ico;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path/dashboard;
      proxy_buffering off;
    }

    location /dashboard/assets/ {
      proxy_pass http://127.0.0.1:9120/assets/;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path/dashboard;
      proxy_buffering off;
    }

    location /dashboard/api/ {
      proxy_pass http://127.0.0.1:9120/api/;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path/dashboard;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }

    location /dashboard/dashboard-plugins/ {
      proxy_pass http://127.0.0.1:9120/dashboard-plugins/;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path/dashboard;
      proxy_buffering off;
    }

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location /terminal/ {
      proxy_pass http://127.0.0.1:7681/terminal/;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:7681;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_buffering off;
    }

    location /dashboard/ {
      proxy_pass http://127.0.0.1:9120/;
      proxy_http_version 1.1;
      proxy_set_header Host 127.0.0.1:9120;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix $http_x_ingress_path/dashboard;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Accept-Encoding "";
      proxy_buffering off;
      sub_filter_once off;
      sub_filter_types text/html;
      sub_filter 'href="/assets/' 'href="'$http_x_ingress_path'/dashboard/assets/';
      sub_filter 'src="/assets/' 'src="'$http_x_ingress_path'/dashboard/assets/';
      sub_filter 'href="/favicon.ico"' 'href="'$http_x_ingress_path'/dashboard/favicon.ico"';
      sub_filter 'window.__HERMES_BASE_PATH__=""' 'window.__HERMES_BASE_PATH__="'$http_x_ingress_path'/dashboard"';
    }
  }
}
